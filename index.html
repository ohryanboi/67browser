<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67Labs OS</title>

<!-- FIXED PATH -->
<link rel="stylesheet" href="ui.css">
</head>
<body>

<!-- BOOT SCREEN -->
<div id="bootScreen">
  <div class="boot-logo">67Labs</div>
  <div class="spinner"></div>
  <div class="boot-text">Starting 67Labs OS...</div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div id="loginClock">
    <div id="loginTime">12:00</div>
    <div id="loginDate">Thursday, January 1</div>
  </div>
  <div id="loginCard">
    <div id="loginAvatar">👤</div>
    <div id="loginUsername">User</div>
    <div id="loginPasswordWrap">
      <input id="loginPassword" type="password" placeholder="Password" autocomplete="off">
      <button id="loginSubmit" title="Sign in">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div id="loginHint">Press Enter or click → to sign in</div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

  <!-- BROWSER WINDOW -->
  <div id="browserWindow" class="window" data-app-id="browser">
    <div class="window-header">
      <div class="window-title-area">
        <span class="window-icon shell-glyph shell-glyph-browser" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6.2" fill="url(#navGradOuter)"/>
            <path d="M8 3.2c2.8 0 5 2.2 5 5 0 .5-.1 1-.2 1.4H8.5L5.2 5.7A4.9 4.9 0 0 1 8 3.2Z" fill="url(#navGradInner)"/>
            <path d="M4 10.1c.8 1.7 2.3 2.7 4 2.7 1.9 0 3.5-1.2 4.2-2.9l-3.1-.1-1.7 1.8L4 10.1Z" fill="#f8fbff" fill-opacity=".92"/>
            <defs>
              <linearGradient id="navGradOuter" x1="2" y1="2" x2="14" y2="14">
                <stop offset="0" stop-color="#5ab4ff"/>
                <stop offset="1" stop-color="#2563eb"/>
              </linearGradient>
              <linearGradient id="navGradInner" x1="5" y1="4" x2="12" y2="11">
                <stop offset="0" stop-color="#7ef7d3"/>
                <stop offset="1" stop-color="#1f75ff"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="window-title">Browser</span>
      </div>
      <div class="window-controls">
        <button id="minBtn" title="Minimize"></button>
        <button id="maxBtn" title="Maximize"></button>
        <button id="closeBtn" title="Close"></button>
      </div>
    </div>

    <!-- ADDRESS BAR -->
    <div class="address-bar">
      <button id="backBtn" disabled title="Back">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M8 1L3 6l5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="fwdBtn" disabled title="Forward">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M4 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="refreshBtn" title="Refresh">
        <svg width="13" height="13" viewBox="0 0 13 13"><path d="M11 6.5A4.5 4.5 0 1 1 6.5 2a4.48 4.48 0 0 1 3 1.15L11 1.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="11,1.5 11,4 8.5,4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="url-pill">
        <svg class="url-icon" width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z" stroke="currentColor" stroke-width="1.8"/><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.8"/></svg>
        <input id="urlInput" placeholder="Search or enter web address">
      </div>
    </div>

    <iframe id="browserFrame"></iframe>
  </div>

  <div id="snapPreview" aria-hidden="true"></div>

  <!-- START MENU -->
  <div id="startMenu" aria-hidden="true">
    <div class="start-search-row">
      <input id="startSearch" type="text" placeholder="Search for apps, settings, or files">
    </div>
    <div class="start-section">
      <div class="start-section-head">
        <span>Pinned</span>
        <button id="pinHintBtn" class="shell-link-btn" type="button">Pin apps</button>
      </div>
      <div id="startAppsGrid"></div>
    </div>
    <div class="start-section">
      <div class="start-section-head">
        <span>Recommended</span>
        <button id="clearRecentBtn" class="shell-link-btn" type="button">Clear</button>
      </div>
      <div id="recommendedApps"></div>
    </div>
    <div id="startMenuFooter">
      <div class="shell-user-chip">
        <span class="shell-user-avatar">◉</span>
        <div>
          <strong>User</strong>
          <span>Front-end shell</span>
        </div>
      </div>
      <div class="start-footer-actions">
        <button id="trayThemeToggle" class="start-footer-btn" type="button">Theme</button>
        <button id="lockShellBtn" class="start-footer-btn" type="button">Lock</button>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <aside id="notificationPanel" aria-hidden="true">
    <div class="panel-head">
      <div>
        <h3>Notifications</h3>
        <p>Recent desktop activity</p>
      </div>
      <button id="clearNotificationsBtn" class="shell-link-btn" type="button">Clear</button>
    </div>
    <div id="notificationList"></div>
  </aside>

  <!-- CHEAT MENU -->
  <aside id="cheatMenu" aria-hidden="true">
    <div class="panel-head">
      <div>
        <h3>Secret Cheat Menu</h3>
        <p>Unlocked with a hidden code</p>
      </div>
      <button id="closeCheatBtn" class="shell-link-btn" type="button">Close</button>
    </div>
    <div class="cheat-grid">
      <button class="cheat-btn" data-cheat="cascade">Cascade windows</button>
      <button class="cheat-btn" data-cheat="matrix">Matrix wallpaper</button>
      <button class="cheat-btn" data-cheat="celebrate">Confetti toast</button>
      <button class="cheat-btn" data-cheat="pinall">Pin core apps</button>
      <button class="cheat-btn" data-cheat="dark">Dark mode</button>
      <button class="cheat-btn" data-cheat="light">Light mode</button>
    </div>
    <div class="cheat-hint">Hint: try the classic up-up-down-down sequence.</div>
  </aside>

  <!-- TASKBAR -->
  <div id="taskbar">
    <div id="taskbarCenter">
      <button id="startBtn" title="Start" type="button" aria-label="Open Start menu">
        <span class="start-logo" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
      </button>
      <div id="taskIcons"></div>
    </div>
    <button id="systemTray" type="button" aria-label="Open notifications and quick status">
      <div id="trayStatusIcons" aria-hidden="true">
        <span class="tray-icon tray-wifi"></span>
        <span class="tray-icon tray-volume"></span>
        <span class="tray-icon tray-battery"></span>
        <span class="tray-icon tray-bell"></span>
      </div>
      <div id="trayClockBlock">
        <div id="clock"></div>
        <div id="clockDate"></div>
      </div>
    </button>
  </div>


</div>

<!-- SCRIPTS -->
<script src="browser.js"></script>
<script src="os.js"></script>
<script src="apps.js"></script>
<script src="system.js"></script>

</body>
</html>
