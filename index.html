<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Windows 11 Web OS</title>

<style>
* { box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

body {
  margin: 0;
  overflow: hidden;
  background: url("https://thebroncwriter.online/wp-content/uploads/2025/11/67-kid.jpg") center/cover no-repeat fixed;
}

/* ---------------- LOCK SCREEN ---------------- */

#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://thebroncwriter.online/wp-content/uploads/2025/11/67-kid.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  backdrop-filter: blur(8px);
  transition: opacity 0.5s ease;
  z-index: 9999;
}

#loginBox {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 300px;
}

#loginBox h2 {
  margin-bottom: 20px;
}

#passwordInput {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 15px;
  font-size: 16px;
}

#loginBtn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #0078d4;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

#loginBtn:hover {
  background: #005ea6;
}

#errorMsg {
  color: #ffb3b3;
  font-size: 13px;
  margin-top: 10px;
}

/* ---------------- TASKBAR ---------------- */

#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 55px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  display: none;
}

.task-icon {
  font-size: 22px;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 8px;
  transition: 0.2s;
}

.task-icon:hover {
  background: rgba(0,0,0,0.1);
}

/* ---------------- WINDOW ---------------- */

.window {
  position: absolute;
  width: 1000px;
  height: 650px;
  top: 80px;
  left: 150px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
  overflow: hidden;
  display: none;
  resize: both;
}

.titlebar {
  height: 40px;
  background: #f3f3f3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  cursor: move;
}

.controls span {
  margin-left: 10px;
  cursor: pointer;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 6px;
}

.controls span:hover {
  background: rgba(0,0,0,0.1);
}

.toolbar {
  height: 45px;
  background: #fafafa;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  border-bottom: 1px solid #ddd;
}

.toolbar button {
  border: none;
  background: #e8e8e8;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.toolbar button:hover {
  background: #d8d8d8;
}

#addressBar {
  flex: 1;
  height: 32px;
  border-radius: 20px;
  border: 1px solid #ccc;
  padding: 0 15px;
  font-size: 14px;
}

.content {
  height: calc(100% - 85px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div id="loginBox">
    <h2>67Labs</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button id="loginBtn">Sign in</button>
    <div id="errorMsg"></div>
  </div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
  <div class="task-icon" onclick="openBrowser()">🌐</div>
</div>

<!-- BROWSER WINDOW -->
<div class="window" id="browser">
  <div class="titlebar" id="titlebar">
    <div>Google</div>
    <div class="controls">
      <span onclick="minimize()">—</span>
      <span onclick="maximize()">▢</span>
      <span onclick="closeBrowser()">✕</span>
    </div>
  </div>

  <div class="toolbar">
    <button onclick="goHome()">🏠</button>
    <button onclick="refreshPage()">⟳</button>
    <input type="text" id="addressBar" placeholder="Search Google or type a URL">
  </div>

  <div class="content">
    <iframe id="browserFrame" src="https://www.google.com/webhp?igu=1"></iframe>
  </div>
</div>

<script>
const lockScreen = document.getElementById("lockScreen");
const taskbar = document.getElementById("taskbar");
const browser = document.getElementById("browser");
const iframe = document.getElementById("browserFrame");
const addressBar = document.getElementById("addressBar");
const passwordInput = document.getElementById("passwordInput");
const errorMsg = document.getElementById("errorMsg");

let isMax = false;

/* LOGIN */
document.getElementById("loginBtn").onclick = function(){
  if(passwordInput.value === "67"){
    lockScreen.style.opacity = "0";
    setTimeout(()=>{
      lockScreen.style.display = "none";
      taskbar.style.display = "flex";
    },500);
  } else {
    errorMsg.textContent = "Incorrect password";
  }
};

passwordInput.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    document.getElementById("loginBtn").click();
  }
});

/* BROWSER */
function openBrowser(){ browser.style.display = "block"; }
function closeBrowser(){ browser.style.display = "none"; }
function minimize(){ browser.style.display = "none"; }

function maximize(){
  if(!isMax){
    browser.style.top="0";
    browser.style.left="0";
    browser.style.width="100%";
    browser.style.height="calc(100% - 55px)";
    isMax=true;
  } else {
    browser.style.top="80px";
    browser.style.left="150px";
    browser.style.width="1000px";
    browser.style.height="650px";
    isMax=false;
  }
}

function goHome(){
  iframe.src="https://www.google.com/webhp?igu=1";
  addressBar.value="";
}

function refreshPage(){
  iframe.src=iframe.src;
}

addressBar.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    let value=addressBar.value.trim();
    if(value.startsWith("http")){
      iframe.src=value;
    } else if(value.includes(".")){
      iframe.src="https://"+value;
    } else {
      iframe.src="https://www.google.com/search?q="+encodeURIComponent(value)+"&igu=1";
    }
  }
});

/* DRAG */
let drag=false, offsetX, offsetY;
document.getElementById("titlebar").addEventListener("mousedown",function(e){
  if(isMax) return;
  drag=true;
  offsetX=e.clientX-browser.offsetLeft;
  offsetY=e.clientY-browser.offsetTop;
});
document.addEventListener("mousemove",function(e){
  if(drag){
    browser.style.left=(e.clientX-offsetX)+"px";
    browser.style.top=(e.clientY-offsetY)+"px";
  }
});
document.addEventListener("mouseup",function(){ drag=false; });
</script>

</body>
</html>
